<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HARIBOW オーディション 2026 — 二次審査</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans JP',sans-serif;
  min-height:100vh;
  background:#f7f6f3;
  display:flex;align-items:center;justify-content:center;
  padding:40px 24px;
}
.wrap{width:100%;max-width:480px}

.logo{text-align:center;margin-bottom:36px}
.logo-title{font-size:15px;font-weight:700;color:#1a1a1a;letter-spacing:-.01em}
.logo-sub{font-size:12px;color:#999;margin-top:5px}

.card{
  background:#fff;border-radius:18px;
  padding:28px;
  border:1px solid #e9e6e0;
  box-shadow:0 1px 6px rgba(0,0,0,.06);
}
.card-title{
  font-size:12px;font-weight:600;color:#999;
  text-align:center;margin-bottom:20px;
  letter-spacing:.06em;text-transform:uppercase;
}

.venue-btn{
  display:flex;align-items:center;gap:16px;
  width:100%;padding:18px 20px;border-radius:12px;
  border:1px solid #e9e6e0;
  background:#fff;
  color:#1a1a1a;cursor:pointer;
  font-family:inherit;
  transition:all .15s;
  text-decoration:none;
  margin-bottom:12px;
}
.venue-btn:last-child{margin-bottom:0}
.venue-btn:hover{background:#f7f6f3;border-color:#ccc;transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.venue-btn:active{transform:none;box-shadow:none}
.venue-emoji{font-size:26px;flex-shrink:0}
.venue-info{text-align:left;flex:1}
.venue-name{font-size:15px;font-weight:700;margin-bottom:3px;color:#1a1a1a}
.venue-detail{font-size:12px;color:#999;line-height:1.6}
.venue-arrow{color:#ccc;font-size:20px;flex-shrink:0}

.notice{margin-top:16px;text-align:center;font-size:12px;color:#bbb;line-height:1.8}

/* ─── PC対応 ─── */
@media(min-width:600px){
  .logo-title{font-size:22px}
  .logo-sub{font-size:14px;margin-top:6px}
  .card{padding:36px}
  .card-title{font-size:13px;margin-bottom:24px}
  .venue-btn{padding:22px 24px;margin-bottom:14px}
  .venue-emoji{font-size:32px}
  .venue-name{font-size:18px;margin-bottom:4px}
  .venue-detail{font-size:13px}
  .venue-arrow{font-size:24px}
  .notice{font-size:13px;margin-top:18px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-title">HARIBOW オーディション 2026</div>
    <div class="logo-sub">二次審査 参加者ページ</div>
  </div>
  <div class="card">
    <div class="card-title">参加する会場を選んでください</div>
    <a class="venue-btn" href="tokyo.html">
      <span class="venue-emoji">🗼</span>
      <div class="venue-info">
        <div class="venue-name">東京会場</div>
        <div class="venue-detail">6月21日（日）<br>渋谷区リフレッシュ氷川</div>
      </div>
      <span class="venue-arrow">›</span>
    </a>
    <a class="venue-btn" href="osaka.html">
      <span class="venue-emoji">🌸</span>
      <div class="venue-info">
        <div class="venue-name">大阪会場</div>
        <div class="venue-detail">6月13日（土）<br>くるくるプラザ 吹田市</div>
      </div>
      <span class="venue-arrow">›</span>
    </a>
  </div>
  <div class="notice">間違えた場合はブラウザの「戻る」で<br>この画面に戻れます</div>
  <div style="text-align:center;margin-top:12px;font-size:10px;color:#ccc;letter-spacing:.04em">v2026.04.17</div>
</div>
</body>
</html>
