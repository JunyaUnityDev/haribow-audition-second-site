<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HARIBOW オーディション 2026 — 二次審査</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;min-height:100vh;background:#f7f6f3;display:flex;align-items:center;justify-content:center;padding:24px 16px}
.wrap{width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:32px}
.logo-title{font-size:20px;font-weight:700;color:#1a1a1a;letter-spacing:-.02em}
.logo-sub{font-size:12px;color:#999;margin-top:4px}
.card{background:#fff;border-radius:16px;padding:24px;border:1px solid #e9e6e0;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-title{font-size:12px;font-weight:600;color:#999;text-align:center;margin-bottom:18px;letter-spacing:.06em;text-transform:uppercase}
.venue-btn{display:flex;align-items:center;gap:14px;width:100%;padding:16px 18px;border-radius:10px;border:1px solid #e9e6e0;background:#fff;color:#1a1a1a;cursor:pointer;font-family:inherit;transition:all .15s;text-decoration:none;margin-bottom:10px}
.venue-btn:last-child{margin-bottom:0}
.venue-btn:hover{background:#f7f6f3;border-color:#ccc;transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.venue-btn:active{transform:none;box-shadow:none}
.venue-emoji{font-size:24px;flex-shrink:0}
.venue-info{text-align:left}
.venue-name{font-size:15px;font-weight:700;margin-bottom:2px;color:#1a1a1a}
.venue-detail{font-size:12px;color:#999;line-height:1.5}
.venue-arrow{margin-left:auto;color:#ccc;font-size:18px;flex-shrink:0}
.notice{margin-top:14px;text-align:center;font-size:12px;color:#bbb;line-height:1.7}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-title">HARIBOW オーディション 2026</div>
    <div class="logo-sub">二次審査 参加者ページ</div>
  </div>
  <div class="card">
    <div class="card-title">参加する会場を選んでください</div>
    <a class="venue-btn" href="tokyo.html">
      <span class="venue-emoji">🗼</span>
      <div class="venue-info">
        <div class="venue-name">東京会場</div>
        <div class="venue-detail">6月21日（日）<br>渋谷区リフレッシュ氷川</div>
      </div>
      <span class="venue-arrow">›</span>
    </a>
    <a class="venue-btn" href="osaka.html">
      <span class="venue-emoji">🌸</span>
      <div class="venue-info">
        <div class="venue-name">大阪会場</div>
        <div class="venue-detail">6月13日（土）<br>くるくるプラザ 吹田市</div>
      </div>
      <span class="venue-arrow">›</span>
    </a>
  </div>
  <div class="notice">間違えた場合はブラウザの「戻る」で<br>この画面に戻れます</div>
</div>
</body>
</html>
